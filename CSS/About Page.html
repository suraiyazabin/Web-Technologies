<!DOCTYPE html>
<html>
<head>
    <title>About Page</title>

    <!-- Internal CSS -->
    <style>

        /* Element Selector */
        body {
            font-family: Arial;
        }

        /* Class Selector */
        .section {
            padding: 20px;
            margin: 20px;
        }

        /* ID Selectors */
        #about {
            background-color: #ffcccc;
        }

        #education {
            background-color: #ccffcc;
        }

        #hobbies {
            background-color: #ccccff;
        }

        /* HR Styling */
        hr {
            height: 5px;
            width: 60%;
            background-color: black;
            border: none;
        }

    </style>
</head>

<body>

    <!-- About Me Section -->
    <div id="about" class="section">
        <h2>About Me</h2>

        <!-- Inline CSS -->
        <p style="color: blue;">
            I am a student who loves learning new technologies and building creative projects.
        </p>
    </div>

    <hr>

    <!-- Education Section -->
    <div id="education" class="section">
        <h2>Education</h2>
        <p>I am currently studying Computer Science at university.</p>
    </div>
    
    <hr>

    <!-- Hobbies Section -->
    <div id="hobbies" class="section">
        <h2>Hobbies</h2>
        <p>My hobbies include coding, reading books, and listening to music.</p>
    </div>

</body>
</html>
