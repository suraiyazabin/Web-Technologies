<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>

    <style>

        /* Nav Bar Styling */
        nav {
            background-color: #333;
            width: 100%;              /* full width */
            padding: 10px 0;
            text-align: center;
        }

        /* Links Styling */
        nav a {
            display: inline-block;   /* horizontal */
            color: white;
            text-decoration: none;  /* remove underline */
            padding: 10px 20px;     /* spacing inside */
            margin: 5px;            /* spacing between links */
        }

        /* Hover Effect */
        nav a:hover {
            background-color: yellow;
            color: black;
        }

    </style>
</head>

<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

</body>
</html>
