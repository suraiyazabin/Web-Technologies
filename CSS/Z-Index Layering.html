<!DOCTYPE html>
<html>
<head>
    <title>Z-Index Layering</title>

    <style>

        /* Common Box Style */
        .box {
            position: absolute;      /* required */
            width: 150px;
            height: 150px;
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        /* Box 1 (Red) */
        .box1 {
            background-color: red;
            top: 50px;
            left: 50px;
            z-index: 1;              /* lowest */
        }

        /* Box 2 (Blue) */
        .box2 {
            background-color: blue;
            top: 80px;
            left: 80px;
            z-index: 2;
        }

        /* Box 3 (Green) */
        .box3 {
            background-color: green;
            top: 110px;
            left: 110px;
            z-index: 3;              /* highest */
        }

    </style>
</head>

<body>

    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">Box 3</div>

</body>
</html>
