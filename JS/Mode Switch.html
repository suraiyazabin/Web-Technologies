<!DOCTYPE html>
<html>
<head>
    <title>Interactive Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 15px;
            text-align: center;
            background-color: #f0f0f0;
            border-bottom: 2px solid #ccc;
        }

        nav {
            text-align: center;
            margin: 10px 0;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        nav a:hover {
            color: blue;
        }

        section {
            display: none;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        section.active {
            display: block;
        }

        #clockGreeting {
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
        }

        #themeBtn {
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            margin: 5px 0 10px 0;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 12px;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .dark {
            background-color: #222;
            color: white;
        }

        .dark header {
            background-color: #333;
            border-bottom: 2px solid #555;
        }

        .dark nav a {
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Portfolio</h1>
        <button id="themeBtn">Switch to Dark Mode</button>
        <div id="clockGreeting"></div>
    </header>

    <nav>
        <a href="#" data-section="about">About</a>
        <a href="#" data-section="projects">Projects</a>
        <a href="#" data-section="contact">Contact</a>
    </nav>

    <!-- Sections -->
    <section id="about" class="active">
        <h2>About Me</h2>
        <p>Hello! I am a computer science student passionate about web development.</p>
    </section>

    <section id="projects">
        <h2>Projects</h2>
        <ul>
            <li>Interactive Portfolio Website</li>
            <li>Text Analyzer Tool</li>
            <li>Student Management System</li>
        </ul>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contactForm">
            <label>Name:</label>
            <input type="text" id="cName">
            <div class="error" id="nameErr"></div>

            <label>Email:</label>
            <input type="text" id="cEmail">
            <div class="error" id="emailErr"></div>

            <label>Message:</label>
            <textarea id="cMsg" rows="5"></textarea>
            <div class="error" id="msgErr"></div>

            <button type="submit">Send</button>
            <div id="successMsg" style="color:green;margin-top:10px;"></div>
        </form>
    </section>

    <script>
        // 1️⃣ Theme Toggle
        let themeBtn = document.getElementById("themeBtn");
        let darkMode = false;

        themeBtn.addEventListener("click", function() {
            darkMode = !darkMode;
            document.body.classList.toggle("dark", darkMode);
            themeBtn.innerText = darkMode ? "Switch to Light Mode" : "Switch to Dark Mode";
        });

        // 2️⃣ Clock / Time-Based Greeting
        function updateClockGreeting() {
            let now = new Date();
            let hours = now.getHours();
            let greeting = hours < 12 ? "Good Morning!" : (hours < 18 ? "Good Afternoon!" : "Good Evening!");
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // format HH:MM:SS
            let hh = hours < 10 ? "0" + hours : hours;
            let mm = minutes < 10 ? "0" + minutes : minutes;
            let ss = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("clockGreeting").innerText = greeting + "  " + hh + ":" + mm + ":" + ss;
        }
        setInterval(updateClockGreeting, 1000);
        updateClockGreeting();

        // 3️⃣ Section Toggling
        let navLinks = document.querySelectorAll("nav a");
        let sections = document.querySelectorAll("section");

        navLinks.forEach(function(link) {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                let target = this.getAttribute("data-section");
                sections.forEach(sec => sec.classList.remove("active"));
                document.getElementById(target).classList.add("active");
            });
        });

        // 4️⃣ Contact Form Validation
        let form = document.getElementById("contactForm");
        form.addEventListener("submit", function(e) {
            e.preventDefault();

            let name = document.getElementById("cName").value.trim();
            let email = document.getElementById("cEmail").value.trim();
            let msg = document.getElementById("cMsg").value.trim();

            let nameErr = document.getElementById("nameErr");
            let emailErr = document.getElementById("emailErr");
            let msgErr = document.getElementById("msgErr");
            let successMsg = document.getElementById("successMsg");

            nameErr.innerText = "";
            emailErr.innerText = "";
            msgErr.innerText = "";
            successMsg.innerText = "";

            let valid = true;

            if(name === "") {
                nameErr.innerText = "Name cannot be empty!";
                valid = false;
            }

            if(!email.includes("@") || !email.includes(".")) {
                emailErr.innerText = "Enter a valid email!";
                valid = false;
            }

            if(msg.length < 10) {
                msgErr.innerText = "Message must be at least 10 characters!";
                valid = false;
            }

            if(valid) {
                successMsg.innerText = "Message Sent Successfully!";
                form.reset();
            }
        });
    </script>

</body>
</html>
